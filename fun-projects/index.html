<body class="bg-black fun-projects-page min-h-screen overflow-y-auto">
    <canvas id="bg-canvas"></canvas>

    <div class="tiles-section active pt-16 pb-16" id="fun-projects-tiles-section">

                        <strong>Flappy Bird</strong>
